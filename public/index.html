
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Parking Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 11l1.5-4.5h11L19 11m-1 5v2H6v-2m-2-5h16l1 3v4h-2v2h-2v-2H7v2H5v-2H3v-4l1-3z M7.5 13.5A1 1 0 108.5 14.5 1 1 0 007.5 13.5zm9 0a1 1 0 101 1 1 1 0 00-1-1z"/>
      </svg>
    </div>
    <div>
      <h1>PARKING MGMT</h1>
      <span>Vehicle Parking Management System</span>
    </div>
  </div>
  <div class="api-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- LEFT SIDEBAR -->
  <aside>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card total">
        <div class="stat-num" id="countTotal">—</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card parked">
        <div class="stat-num" id="countParked">—</div>
        <div class="stat-label">Parked</div>
      </div>
      <div class="stat-card exited">
        <div class="stat-num" id="countExited">—</div>
        <div class="stat-label">Exited</div>
      </div>
    </div>

    <!-- Park Vehicle Form -->
    <div class="panel" style="margin-bottom:1.25rem">
      <div class="panel-header">
        <span class="panel-title">// Park Vehicle</span>
      </div>
      <div class="panel-body">
        <div class="form-group">
          <label>Plate Number</label>
          <input type="text" id="newPlate" placeholder="e.g. ABC-1234" maxlength="20">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label>Vehicle Type</label>
          <select id="newType">
            <option value="Car">Car</option>
            <option value="Motorcycle">Motorcycle</option>
            <option value="Truck">Truck</option>
          </select>
        </div>
        <button class="btn btn-primary" style="margin-top:1rem" onclick="parkVehicle()">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
          </svg>
          Park Vehicle
        </button>
      </div>
    </div>

    <!-- Recently Parked -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">// Recently Parked</span>
        <button class="btn btn-outline btn-sm" onclick="loadRecent()">Refresh</button>
      </div>
      <div class="panel-body" id="recentList">
        <div class="loading"><div class="spinner"></div> Loading...</div>
      </div>
    </div>

  </aside>

  <!-- RIGHT: Vehicle Registry -->
  <div class="right-col">
    <div class="panel" style="flex:1">
      <div class="panel-header">
        <span class="panel-title">// Vehicle Registry</span>
        <button class="btn btn-outline btn-sm" onclick="loadVehicles()">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Refresh
        </button>
      </div>
      <div class="panel-body">

        <!-- Single search bar -->
        <div class="search-bar">
          <svg class="search-icon" width="14" height="14" fill="none"
               stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search by plate number…" oninput="searchPlate()">
          <button class="search-clear" id="searchClear" onclick="clearSearch()" title="Clear search">✕</button>
        </div>

        <!-- Filter pills -->
        <div class="filter-pills" id="filterPills">
          <button class="pill active-all" onclick="filterVehicles('all', this)">All</button>
          <button class="pill"            onclick="filterVehicles('parked', this)">Parked</button>
          <button class="pill"            onclick="filterVehicles('left', this)">Exited</button>
        </div>

        <div class="vehicle-list-wrap">
          <div id="searchResults" style="display:none"></div>
          <div class="vehicle-list" id="vehicleList">
            <div class="loading"><div class="spinner"></div> Loading vehicles...</div>
          </div>
        </div>

      </div>
    </div>
  </div>

</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-title">// Edit Vehicle</div>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Plate Number</label>
      <input type="text" id="editPlate">
    </div>
    <div class="form-group">
      <label>Vehicle Type</label>
      <select id="editType">
        <option value="Car">Car</option>
        <option value="Motorcycle">Motorcycle</option>
        <option value="Truck">Truck</option>
      </select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="editStatus">
        <option value="parked">Parked</option>
        <option value="left">Exited</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="updateVehicle()">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toasts" id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
